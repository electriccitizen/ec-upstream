$schema: https://git.drupalcode.org/project/drupal/-/raw/HEAD/core/assets/schemas/v1/metadata.schema.json
name: Accordion group
status: stable
group: Dripyard General
props:
  type: object
  required:
    - variation
  properties:
    theme:
      title: Theme
      type: string
      enum:
        - inherit
        - white
        - light
        - dark
        - black
        - primary
      examples: [ inherit ]
    variation:
      type: string
      title: Visual variation
      enum:
        - background-color
        - borders
      examples: [ background-color ]
slots:
  accordion_group_content:
    title: Accordion items
