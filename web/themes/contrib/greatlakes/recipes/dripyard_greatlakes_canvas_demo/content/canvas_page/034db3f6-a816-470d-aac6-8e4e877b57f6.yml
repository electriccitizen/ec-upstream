      component_id: sdc.dripyard_base.text
      inputs:
        text:
          value: '<p>Great Lakes University is committed to making education affordable. We offer merit-based scholarships, need-based grants, work-study programs, and federal student loans. Over 90% of our students receive some form of financial assistance.</p>'
          format: canvas_html_block
        style: body_m
        color: medium
        center: false
