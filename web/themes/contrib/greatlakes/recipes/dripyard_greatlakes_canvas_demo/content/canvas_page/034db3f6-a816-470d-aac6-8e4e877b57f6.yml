      slot: accordion_item_content
      uuid: cecd7b4c-7a2a-4701-91bc-0d4ae0a80b42
      component_id: sdc.dripyard_base.text
      inputs:
        text:
          value: '<p>Our streamlined application process makes it easy to join the Great Lakes family. Simply complete our online application, submit your transcripts, provide letters of recommendation, and write a personal essay. Our admissions team is here to guide you through every step.</p>'
          format: canvas_html_block
        style: body_m
        color: medium
        center: false
