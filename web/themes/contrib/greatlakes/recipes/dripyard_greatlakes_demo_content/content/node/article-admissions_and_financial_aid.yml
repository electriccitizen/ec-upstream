  body:
    -
      value: '<p>Great Lakes University is committed to making higher education accessible and affordable for all qualified students. Our holistic admissions process considers not just academic achievement, but also leadership potential, community involvement, and personal character.</p><p>We offer comprehensive financial aid packages that combine merit scholarships, need-based grants, work-study opportunities, and federal student loans. Our financial aid office works closely with families to create personalized funding plans that make a Great Lakes education possible.</p><p>The application process is straightforward: submit your application online, provide official transcripts, secure letters of recommendation, and write a personal statement. Our admissions counselors are available to guide you through every step and answer any questions you may have about joining the Laker family.</p>'
