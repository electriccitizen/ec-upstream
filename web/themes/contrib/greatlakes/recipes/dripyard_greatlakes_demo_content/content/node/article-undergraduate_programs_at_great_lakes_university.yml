  body:
    -
      value: "<p>Great Lakes University offers over 40 undergraduate degree programs across four schools: the School of Business, School of Education, School of Liberal Arts and Sciences, and School of Applied Sciences. Our academic programs are designed to provide students with both theoretical knowledge and practical skills needed for success in their chosen careers.</p><p>What sets our programs apart is our commitment to small class sizes, hands-on learning experiences, and close mentorship from faculty. Students have opportunities to engage in undergraduate research, complete internships with local and regional employers, and participate in study abroad programs that broaden their global perspective.</p><p>Whether you're interested in pursuing a career in business, education, healthcare, or the arts, Great Lakes University provides the foundation for your success. Our graduates consistently report high satisfaction rates and strong employment outcomes, with 94% finding employment or continuing their education within six months of graduation.</p>"
