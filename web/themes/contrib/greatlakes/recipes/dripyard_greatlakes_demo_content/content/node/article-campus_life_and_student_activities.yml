  body:
    -
      value: "<p>Life at Great Lakes University extends far beyond the classroom. With over 60 student organizations, NCAA Division III athletics, and a vibrant campus community, there's something for everyone to get involved in and make lasting connections.</p><p>Student government provides opportunities for leadership and advocacy, while academic honor societies recognize scholarly achievement. Greek life offers brotherhood and sisterhood experiences, and service organizations allow students to give back to the community. Our campus programming board organizes concerts, speakers, and social events throughout the year.</p><p>Athletics play a central role in campus life, with 18 varsity sports teams competing in the Great Lakes Athletic Conference. Whether you're a student-athlete or a fan cheering from the stands, Laker pride runs deep throughout our community.</p>"
