  body:
    -
      value: "<p>Great Lakes University's Career Services Center is dedicated to helping students and alumni achieve their professional goals. From resume writing and interview preparation to job search strategies and networking opportunities, we provide comprehensive support throughout your career journey.</p><p>Our strong alumni network spans across industries and geographic regions, providing valuable connections and mentorship opportunities for current students. Alumni regularly return to campus for career fairs, panel discussions, and networking events, sharing their expertise and opening doors for the next generation of Lakers.</p><p>With a 94% employment rate within six months of graduation, Great Lakes University graduates are well-prepared to enter the workforce or continue their education in graduate programs. Our career outcomes reflect the quality of education and support our students receive throughout their university experience.</p>"
