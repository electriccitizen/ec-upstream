$schema: https://git.drupalcode.org/project/drupal/-/raw/HEAD/core/assets/schemas/v1/metadata.schema.json
name: Icon
status: stable
group: Dripyard Basic
replaces: 'dripyard_base:icon'
props:
  type: object
  required:
    - icon
  properties:
    size:
      title: Size
      type: integer
      examples: [ 32 ]
    icon:
      title: Icon
      type: string
      examples: [ 'drupal' ]
