greatlakes_subtheme.settings:
  type: theme_settings
  label: 'Great Lakes settings'
  mapping:
    social_media_links:
      type: mapping
      label: 'Social media links'
      mapping:
        bluesky:
          type: string
          label: 'Bluesky URL'
        discord:
          type: string
          label: 'Discord URL'
        facebook:
          type: string
          label: 'Facebook URL'
        github:
          type: string
          label: 'GitHub URL'
        instagram:
          type: string
          label: 'Instagram URL'
        linkedin:
          type: string
          label: 'LinkedIn URL'
        mastodon:
          type: string
          label: 'Mastodon URL'
        pinterest:
          type: string
          label: 'Pinterest URL'
        reddit:
          type: string
          label: 'Reddit URL'
        snapchat:
          type: string
          label: 'Snapchat URL'
        telegram:
          type: string
          label: 'Telegram URL'
        threads:
          type: string
          label: 'Threads URL'
        tiktok:
          type: string
          label: 'TikTok URL'
        twitch:
          type: string
          label: 'Twitch URL'
        twitter:
          type: string
          label: 'Twitter URL'
        whatsapp:
          type: string
          label: 'WhatsApp URL'
        youtube:
          type: string
          label: 'YouTube URL'
    theme_colors:
      type: mapping
      label: 'Theme colors'
      mapping:
        site_theme:
          type: string
          label: 'Site theme'
        color_scheme:
          type: string
          label: 'Color scheme'
        colors:
          type: mapping
          label: 'Colors'
          mapping:
            base_primary_color:
              type: string
              label: 'Base primary color'
            base_primary_color_brightness:
              type: string
              label: 'Base primary color brightness'
    footer:
      type: mapping
      label: 'Footer settings'
      mapping:
        theme:
          type: string
          label: 'Footer theme'
    layout_settings:
      type: mapping
      label: 'Layout settings'
      mapping:
        container_max_width:
          type: string
          label: 'Container max width'
        border_radius_sm:
          type: string
          label: 'Small border radius'
        border_radius_md:
          type: string
          label: 'Medium border radius'
        border_radius_lg:
          type: string
          label: 'Large border radius'
        border_radius_button:
          type: string
          label: 'Button border radius'
    apply_recipes:
      type: mapping
      label: 'Apply recipes'
      mapping:
        dripyard_greatlakes_subtheme_blocks:
          type: integer
          label: 'Dripyard Great Lakes blocks'
        dripyard_greatlakes_subtheme_nodes:
          type: integer
          label: 'Dripyard Great Lakes nodes'
        dripyard_greatlakes_subtheme_demo_content:
          type: integer
          label: 'Dripyard Great Lakes demo content'
        dripyard_greatlakes_subtheme_landing_pages:
          type: integer
          label: 'Dripyard Great Lakes landing pages'
        dripyard_greatlakes_subtheme_layout_builder_demo:
          type: integer
          label: 'Dripyard Great Lakes layout builder demo'
        dripyard_greatlakes_subtheme_canvas_demo:
          type: integer
          label: 'Dripyard Great Lakes Drupal Canvas demo'
        notice:
          type: string
          label: 'Notice'
