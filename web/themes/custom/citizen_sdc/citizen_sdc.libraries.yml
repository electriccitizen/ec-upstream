global:
  header: false
  css:
    theme:
      components/style.css: {}
  dependencies:
    - core/drupal
    - core/drupalSettings
    - core/once
    - core/normalize

paragraph-animate:
  version: 1.0
  js:
    js/paragraph-animate.js: {}
  dependencies:
    - core/drupal
    - core/once

basicTable:
  version: 2.0.0
  css:
    theme:
      components-addons/basictable/basictable.css: { minified: false }
  js:
    components-addons/basictable/jquery.basictable.min.js: { minified: true }
  dependencies:
    - core/jquery
fonts:
  css:
    theme:
      https://fonts.googleapis.com/css?family=Open+Sans:ital,wght@0,400;;0,700;1,400: { type: external, preprocess: false }
select2:
  version: 4.1.0-rc.0
  css:
    theme:
      components-addons/select2/select2.min.css: { minified: true }
  js:
    components-addons/select2/select2.min.js: { minified: true }
  dependencies:
    - core/jquery

slick:
  version: 1.8.1
  css:
    theme:
      components-addons/slick/slick.css: { minified: false }
      components-addons/slick/slick-theme.css: { minified: false }
  js:
    components-addons/slick/slick.min.js: { minified: true }
  dependencies:
    - core/jquery

featherlight:
  version: 1.7.13
  css:
    theme:
      components-addons/featherlight/featherlight.css: { minified: false }
      components-addons/featherlight/featherlight.gallery.css: { minified: false }
  js:
    components-addons/featherlight/featherlight.min.js: { minified: true }
    components-addons/featherlight/featherlight.gallery.min.js: { minified: true }
  dependencies:
    - core/jquery

