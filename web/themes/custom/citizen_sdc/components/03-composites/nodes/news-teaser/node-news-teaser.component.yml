component:
  id: citizen_sdc:node-news-teaser
  label: 'Node News (Teaser)'
  description: 'Teaser view-mode wrapper for news nodes. Delegates to node-teaser-base with the news image as the image slot and a publication date (`F j, Y`) + field_meta_description composed into the content slot.'
  status: experimental

props:
  type: object
  required:
    - title
    - url
  properties:
    attr:
      type: object
      description: 'Drupal Attributes object for the <article> wrapper'
    title:
      type: string
      description: 'Plain-text node title'
    url:
      type: string
      description: 'URL to the full news node'
    title_attr:
      type: object
      description: 'Drupal Attributes object for the <h2> title element'
    date:
      type: [string, integer, 'null']
      description: 'Unix timestamp for the publication date (typically `node.created.value`). Rendered with the `F j, Y` PHP date format.'

slots:
  image:
    title: 'Image'
    description: 'Rendered field_image (responsive image via entity_reference_entity_view → 400x300 media view mode)'
  summary:
    title: 'Summary'
    description: 'Rendered field_meta_description'
