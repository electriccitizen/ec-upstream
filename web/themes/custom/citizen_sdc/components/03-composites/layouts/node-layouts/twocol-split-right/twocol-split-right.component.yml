component:
  id: citizen_sdc:twocol-split-right
  label: 'Two Column Split Right Layout'
  description: 'Node layout with a main content column (third, content) on the left and a right sidebar column that can split into two stacked regions (first, second). Regions have independent column heights via CSS floats on desktop; collapses to a reordered single column on mobile.'
  status: experimental

props:
  type: object
  properties:
    attr:
      type: object
      description: 'Drupal Attributes object for the layout wrapper'
    first_attr:
      type: object
      description: 'Drupal Attributes object for the first region wrapper'
    second_attr:
      type: object
      description: 'Drupal Attributes object for the second region wrapper'
    third_attr:
      type: object
      description: 'Drupal Attributes object for the third region wrapper'
    content_attr:
      type: object
      description: 'Drupal Attributes object for the content region wrapper'

slots:
  first:
    title: 'First'
    description: 'Top region in the right sidebar column'
  second:
    title: 'Second'
    description: 'Bottom region in the right sidebar column'
  third:
    title: 'Third'
    description: 'Top region in the left content column'
  content:
    title: 'Content'
    description: 'Main content region in the left column, flowing below third'
