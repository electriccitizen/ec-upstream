component:
  id: citizen_sdc:views-homepage-news
  label: 'Views Home Page News'
  description: 'Thin child of `citizen_sdc:views-unformatted-base` for the `news.homepage_news` embed display. Filters to promoted news items, limit 3, no exposed filters — intended for the site home page via view-placer.'
  status: experimental

props:
  type: object
  required:
    - rows
  properties:
    attr:
      type: object
    title:
      type: [string, 'null']
    default_row_class:
      type: boolean
    rows:
      type: array
