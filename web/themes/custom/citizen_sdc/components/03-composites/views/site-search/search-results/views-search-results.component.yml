component:
  id: citizen_sdc:views-search-results
  label: 'Views Site Search Results'
  description: 'Thin child of `citizen_sdc:views-unformatted-base` for the `site_search.site_search_block` view display. Ports the dart search-results SCSS and hosts the search-highlight JS that wraps matched terms in `<mark class="search-highlight">` for the meta-description field.'
  status: experimental

props:
  type: object
  required:
    - rows
  properties:
    attr:
      type: object
    title:
      type: [string, 'null']
    default_row_class:
      type: boolean
    rows:
      type: array
