component:
  id: citizen_sdc:views-all-bios
  label: 'Views All Bios'
  description: 'Thin child of `citizen_sdc:views-unformatted-base` for the `bios.all_bios` view display. Exists so the display-specific SCSS auto-attaches on pages that render this view.'
  status: experimental

props:
  type: object
  required:
    - rows
  properties:
    attr:
      type: object
    title:
      type: [string, 'null']
    default_row_class:
      type: boolean
    rows:
      type: array
