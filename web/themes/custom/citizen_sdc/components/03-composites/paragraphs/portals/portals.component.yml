component:
  id: citizen_sdc:portals
  label: 'Portals'
  description: 'Portal cards grouped under an optional widget title.'
  status: experimental
  library: citizen_sdc/portals

props:
  type: object
  additionalProperties: false
  required:
    - items
  properties:
    title:
      type: string
      title: 'Widget title'
      description: 'Optional heading displayed above the portals.'
    items:
      type: array
      title: 'Portal items'
      items:
        type: object
        additionalProperties: false
        required:
          - headline
        properties:
          link:
            type: object
            title: 'Portal link'
            properties:
              url:
                type: string
                format: uri
                title: 'Destination URL'
              title:
                type: string
                title: 'Link title'
              target:
                type: string
                title: 'Target attribute'
              rel:
                type: string
                title: 'Rel attribute'
          image:
            type: string
            title: 'Image markup'
          headline:
            type: string
            title: 'Portal headline'
          long_text:
            type: string
            title: 'Portal description (HTML allowed)'
